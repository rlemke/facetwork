{% if attrs_compact is defined and attrs_compact %}
{% for name, attr in attrs.items() %}
<tr><td>{{ name }}</td><td><code>{{ attr.value|tojson }}</code></td></tr>
{% endfor %}
{% else %}
<table>
    <thead><tr><th>Name</th><th>Value</th><th>Type</th></tr></thead>
    <tbody>
    {% for name, attr in attrs.items() %}
    <tr><td>{{ name }}</td><td>{{ attr.value }}</td><td>{{ attr.type_hint }}</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endif %}
