<figure>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Step ID</th>
            <th>Step Name</th>
            <th>Workflow ID</th>
            <th>State</th>
            <th>Event Type</th>
        </tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td><a href="/events/{{ event.uuid }}">{{ event.uuid[:12] }}...</a></td>
            <td class="mono">{{ event.step_id[:12] }}...</td>
            <td>{{ step_names.get(event.step_id, '') or '—' }}</td>
            <td class="mono">{{ event.workflow_id[:12] }}...</td>
            <td>{% with state=event.state %}{% include "partials/_state_badge.html" %}{% endwith %}</td>
            <td>{{ event.name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
