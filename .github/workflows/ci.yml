name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dashboard,mcp,mongodb]"

      - name: Run tests with coverage
        run: |
          pytest tests/ examples/ --cov=afl --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel assets
        run: |
          python -c "
          import zipfile, sys, pathlib
          whl = zipfile.ZipFile(next(p for p in pathlib.Path('dist').iterdir() if p.suffix == '.whl'))
          names = whl.namelist()
          for ext in ['.lark', '.html', '.js', '.css']:
              matches = [n for n in names if n.endswith(ext)]
              if not matches:
                  print(f'ERROR: No {ext} files in wheel'); sys.exit(1)
              print(f'OK: {len(matches)} {ext} file(s)')
          "

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dashboard,mcp,mongodb]"
          pip install mypy types-requests

      - name: Run mypy
        run: mypy afl/
