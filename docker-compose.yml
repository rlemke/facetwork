# AgentFlow Development Stack
#
# Infrastructure: MongoDB at afl-mongodb:27017, HDFS at afl-hadoop-hdfs
# (defined in /etc/hosts, not managed by this compose file)
#
# Start services:    docker compose up
# With agents:       docker compose --profile agents up
# Scale agents:      docker compose --profile agents up --scale runner=3
# Dashboard: http://localhost:8080
#
# Seed example workflows: docker compose --profile seed run --rm seed

services:
  # Web dashboard for monitoring workflows
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: afl-dashboard
    ports:
      - "8080:8080"
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_EXAMPLES_DATABASE=${AFL_EXAMPLES_DATABASE:-afl_examples}
      - AFL_LOCAL_OUTPUT_DIR=${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
    volumes:
      - ${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:ro
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 10s
      timeout: 5s
      retries: 3

  # Distributed runner service — handles workflow evaluation only (scalable)
  # Event tasks are handled by specialized agent containers below.
  # Start with: docker compose --profile agents up -d runner
  runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.runner
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_MAX_CONCURRENT=${AFL_MAX_CONCURRENT:-4}
      - AFL_POLL_INTERVAL_MS=${AFL_POLL_INTERVAL_MS:-1000}
      - AFL_REAPER_TIMEOUT_MS=${AFL_REAPER_TIMEOUT_MS:-300000}
      - AFL_OSM_OUTPUT_BASE=${AFL_OSM_OUTPUT_BASE:-}
      - AFL_CACHE_DIR=${AFL_CACHE_DIR:-}
      - AFL_GEOFABRIK_MIRROR=/data/osm-mirror
      - AFL_LOCAL_OUTPUT_DIR=${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - PYTHONPATH=/app:/app/examples/noaa-weather:/app/examples/osm-geocoder
    volumes:
      - ${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - ${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}:${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}
      - ${AFL_GEOFABRIK_MIRROR:-/Volumes/afl_data/osm}:/data/osm-mirror:ro
      - ./examples:/app/examples:ro
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - agents

  # Sample AddOne agent (scalable)
  # Start with: docker compose --profile agents up -d agent-addone
  agent-addone:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_AGENT_NAME=addone-agent
      - AFL_AGENT_HANDLERS=handlers.AddOne
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - agents

  # Seed service (runs once to populate example workflows)
  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.seed
    container_name: afl-seed
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    profiles:
      - seed

  # NOAA Weather agent — RegistryRunner with weather handlers (scalable)
  # Start with: docker compose --profile agents up -d agent-noaa-weather
  agent-noaa-weather:
    build:
      context: .
      dockerfile: docker/Dockerfile.noaa-weather
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_MAX_CONCURRENT=${AFL_MAX_CONCURRENT:-4}
      - AFL_POLL_INTERVAL_MS=${AFL_POLL_INTERVAL_MS:-1000}
      - AFL_REAPER_TIMEOUT_MS=${AFL_REAPER_TIMEOUT_MS:-300000}
      - AFL_EXAMPLES_DATABASE=${AFL_EXAMPLES_DATABASE:-afl_examples}
      - AFL_LOCAL_OUTPUT_DIR=${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - agents

  # OSM Geocoder agent — full image with Java/GraphHopper (scalable)
  # Start with: docker compose --profile agents up -d agent-osm-geocoder
  agent-osm-geocoder:
    build:
      context: .
      dockerfile: docker/Dockerfile.osm-geocoder
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_MAX_CONCURRENT=${AFL_MAX_CONCURRENT:-4}
      - AFL_POLL_INTERVAL_MS=${AFL_POLL_INTERVAL_MS:-1000}
      - AFL_REAPER_TIMEOUT_MS=${AFL_REAPER_TIMEOUT_MS:-300000}
      - AFL_OSM_OUTPUT_BASE=${AFL_OSM_OUTPUT_BASE:-}
      - AFL_CACHE_DIR=${AFL_CACHE_DIR:-}
      - AFL_GEOFABRIK_MIRROR=/data/osm-mirror
      - AFL_LOCAL_OUTPUT_DIR=${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - AFL_LOCALIZE_MOUNTS=/data/osm-mirror
    volumes:
      - ${GRAPHHOPPER_DATA_DIR:-graphhopper_data}:/data/graphhopper
      - ${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - ${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}:${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}
      - ${AFL_GEOFABRIK_MIRROR:-/Volumes/afl_data/osm}:/data/osm-mirror:ro
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - agents

  # OSM Geocoder agent — lite image, no Java/GraphHopper (scalable)
  # Start with: docker compose --profile agents up -d agent-osm-geocoder-lite
  agent-osm-geocoder-lite:
    build:
      context: .
      dockerfile: docker/Dockerfile.osm-geocoder-lite
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - AFL_MAX_CONCURRENT=${AFL_MAX_CONCURRENT:-4}
      - AFL_POLL_INTERVAL_MS=${AFL_POLL_INTERVAL_MS:-1000}
      - AFL_REAPER_TIMEOUT_MS=${AFL_REAPER_TIMEOUT_MS:-300000}
      - AFL_OSM_OUTPUT_BASE=${AFL_OSM_OUTPUT_BASE:-}
      - AFL_CACHE_DIR=${AFL_CACHE_DIR:-}
      - AFL_GEOFABRIK_MIRROR=/data/osm-mirror
      - AFL_LOCAL_OUTPUT_DIR=${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
    volumes:
      - ${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}:${AFL_LOCAL_OUTPUT_DIR:-/Volumes/afl_data/output}
      - ${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}:${AFL_OSM_OUTPUT_BASE:-/Volumes/afl_data/osm-output}
      - ${AFL_GEOFABRIK_MIRROR:-/Volumes/afl_data/osm}:/data/osm-mirror:ro
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - agents

  # MCP Server (Model Context Protocol for LLM agents)
  # MCP uses stdio transport, so run interactively:
  #   docker compose --profile mcp run --rm mcp
  mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: afl-mcp
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    stdin_open: true
    tty: true
    profiles:
      - mcp

  # Jenkins CI/CD — start with: docker compose --profile jenkins up -d
  jenkins:
    image: jenkins/jenkins:lts
    container_name: afl-jenkins
    ports:
      - "9090:8080"   # Web UI
      - "50000:50000" # Agent
    volumes:
      - ${JENKINS_HOME_DIR:-jenkins_home}:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: curl -f http://localhost:8080/login || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    profiles:
      - jenkins

  # LocalStack — start with: docker compose --profile localstack up -d
  localstack:
    image: localstack/localstack
    container_name: afl-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=lambda,stepfunctions,s3,iam
      - LAMBDA_EXECUTOR=local
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: curl -f http://localhost:4566/_localstack/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - localstack

  # AWS Lambda + Step Functions agent — start with: docker compose --profile localstack up -d
  agent-aws-lambda:
    build:
      context: .
      dockerfile: docker/Dockerfile.aws-lambda
    environment:
      - AFL_MONGODB_URL=mongodb://afl-mongodb:27017
      - AFL_MONGODB_DATABASE=afl
      - LOCALSTACK_URL=http://localstack:4566
      - PYTHONPATH=/app
    depends_on:
      localstack:
        condition: service_healthy
    extra_hosts:
      - "afl-mongodb:192.168.68.91"
    restart: unless-stopped
    profiles:
      - localstack

  # PostGIS database — start with: docker compose --profile postgis up -d
  postgis:
    image: postgis/postgis:16-3.4
    container_name: afl-postgis
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=afl_gis
      - POSTGRES_USER=afl
      - POSTGRES_PASSWORD=afl
    volumes:
      - ${POSTGIS_DATA_DIR:-postgis_data}:/var/lib/postgresql/data
      - ./docker/postgis-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: pg_isready -U afl
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - postgis

volumes:
  graphhopper_data:
  jenkins_home:
  localstack_data:
  postgis_data:
