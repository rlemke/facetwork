<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AgentFlow Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><a href="/v2/workflows"><strong>AgentFlow</strong></a></li>
        </ul>
        <ul>
            <li><a href="/v2/workflows"{% if active_tab == 'workflows' %} class="nav-active"{% endif %}>Workflows</a></li>
            <li><a href="/v2/servers"{% if active_tab == 'servers' %} class="nav-active"{% endif %}>Servers</a></li>
            <li><a href="/tasks"{% if active_tab == 'tasks' %} class="nav-active"{% endif %}>Tasks</a></li>
            <li><a href="/flows"{% if active_tab == 'flows' %} class="nav-active"{% endif %}>Flows</a></li>
            <li><a href="/runners"{% if active_tab == 'runners' %} class="nav-active"{% endif %}>Runners</a></li>
            <li><a href="/output"{% if active_tab == 'output' %} class="nav-active"{% endif %}>Output</a></li>
            <li><a href="/census/maps"{% if active_tab == 'census_maps' %} class="nav-active"{% endif %}>Census Maps</a></li>
            <li><a href="/site-selection/"{% if active_tab == 'site_selection' %} class="nav-active"{% endif %}>Site Selection</a></li>
            <li><a href="/workflows/new"{% if active_tab == 'new_workflow' %} class="nav-active"{% endif %}>New Workflow</a></li>
        </ul>
    </nav>

    {% block subnav %}{% endblock %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>AgentFlow Dashboard</small>
    </footer>

    <script>hljs.highlightAll();</script>
    <script>
    // Convert UTC timestamps to the viewer's local timezone
    document.querySelectorAll("time[data-ts]").forEach(function(el) {
        var ms = parseInt(el.getAttribute("data-ts"), 10);
        if (isNaN(ms)) return;
        var d = new Date(ms);
        var pad = function(n) { return n < 10 ? "0" + n : n; };
        el.textContent = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" +
            pad(d.getDate()) + " " + pad(d.getHours()) + ":" +
            pad(d.getMinutes()) + ":" + pad(d.getSeconds());
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
