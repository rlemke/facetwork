<figure>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Step</th>
            <th>State</th>
            <th>Task List</th>
            <th>Runner</th>
            <th>Server</th>
            <th>Last Ping</th>
            <th>Duration</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td class="mono"><a href="/tasks/{{ task.uuid }}">{{ task.uuid|truncate_uuid }}</a></td>
            <td>{{ task.name }}</td>
            <td>{{ step_names.get(task.step_id, '') or '—' }}</td>
            <td>{% with state=task.state %}{% include "partials/_state_badge.html" %}{% endwith %}</td>
            <td>{{ task.task_list_name }}</td>
            <td><a href="/v2/workflows/{{ task.runner_id }}" class="mono">{{ task.runner_id|truncate_uuid }}</a></td>
            {% set si = server_info.get(task.server_id or '') %}
            <td>{{ si['name'] if si else '—' }}</td>
            <td>{{ si['ping_time']|timestamp if si else '—' }}</td>
            <td>{{ (task.updated - task.created)|duration }}</td>
            <td>{{ task.created|timestamp }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
