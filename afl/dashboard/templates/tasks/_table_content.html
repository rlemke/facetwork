<figure>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Step</th>
            <th>State</th>
            <th>Task List</th>
            <th>Runner</th>
            <th>Server</th>
            <th>Last Ping</th>
            <th>Retries</th>
            <th>Duration</th>
            <th>Created</th>
            {% if filter_state == 'dead_letter' %}<th>Actions</th>{% endif %}
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td class="mono"><a href="/tasks/{{ task.uuid }}">{{ task.uuid|truncate_uuid }}</a></td>
            <td>{{ task.name }}</td>
            <td>{{ step_names.get(task.step_id, '') or '—' }}</td>
            <td>{% with state=task.state %}{% include "partials/_state_badge.html" %}{% endwith %}</td>
            <td>{{ task.task_list_name }}</td>
            <td><a href="/v2/workflows/{{ task.runner_id }}" class="mono">{{ task.runner_id|truncate_uuid }}</a></td>
            {% set si = server_info.get(task.server_id or '') %}
            <td>{{ si['name'] if si else '—' }}</td>
            <td>{{ si['ping_time']|time_ago if si else '—' }}</td>
            <td>{{ task.retry_count }}/{{ task.max_retries }}</td>
            <td>{{ (task.updated - task.created)|duration }}</td>
            <td>{{ task.created|timestamp }}</td>
            {% if filter_state == 'dead_letter' %}
            <td>
                <button class="btn-retry-inline outline" hx-post="/tasks/{{ task.uuid }}/reenqueue" hx-swap="none" hx-confirm="Re-enqueue this task?" onclick="event.stopPropagation()">Re-enqueue</button>
                <button class="btn-retry-inline outline contrast" hx-post="/tasks/{{ task.uuid }}/discard" hx-swap="none" hx-confirm="Discard this task?" onclick="event.stopPropagation()">Discard</button>
            </td>
            {% endif %}
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
